<h2>Update Customer</h2>
<p class="subtitle">Modify existing customer details</p>

<div *ngIf="errorMessage" class="error-box">
  {{ errorMessage }}
</div>

<form #updateForm="ngForm" (ngSubmit)="update(updateForm)">
<div class="form-card" *ngIf="!loading">

  <div class="form-grid">

    <!-- NAME -->
    <div class="form-group">
      <label>Name</label>
      <input type="text"
             name="name"
             [(ngModel)]="model.name"
             #name="ngModel"
             (keypress)="allowOnlyLetters($event)"
             (input)="validateName()"
             required />

      <small class="error-text"
             *ngIf="name.invalid && name.touched">
        Name must contain only letters
      </small>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email</label>
      <input type="email"
             name="email"
             [(ngModel)]="model.email"
             #email="ngModel"
             required
             email />

      <small class="error-text"
             *ngIf="email.invalid && email.touched">
        Enter valid email
      </small>
    </div>

    <!-- PHONE -->
    <div class="form-group">
      <label>Phone</label>
      <input type="text"
             name="phone"
             [(ngModel)]="model.phone"
             #phone="ngModel"
             required
             pattern="^[0-9]{10}$"
             maxlength="10" />

      <small class="error-text"
             *ngIf="phone.invalid && phone.touched">
        Phone must be 10 digits
      </small>
    </div>

    <!-- DOB -->
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date"
             name="dateOfBirth"
             [(ngModel)]="model.dateOfBirth"
             #dob="ngModel"
             required />

      <small class="error-text"
             *ngIf="dob.invalid && dob.touched">
        Date of birth required
      </small>

      <small class="error-text"
             *ngIf="model.dateOfBirth && !isAdult(model.dateOfBirth)">
        Must be 18+ years old
      </small>
    </div>

    <!-- COUNTRY -->
    <div class="form-group">
      <label>Country</label>
      <select name="countryId"
              [(ngModel)]="model.countryId"
              (change)="onCountryChange()"
              required>
        <option [ngValue]="null">Select Country</option>
        <option *ngFor="let c of countries"
                [ngValue]="c.countryId">
          {{ c.country }}
        </option>
      </select>
    </div>

    <!-- STATE -->
    <div class="form-group">
      <label>State</label>
      <select name="stateId"
              [(ngModel)]="model.stateId"
              (change)="onStateChange()"
              required>
        <option [ngValue]="null">Select State</option>
        <option *ngFor="let s of states"
                [ngValue]="s.stateId">
          {{ s.state }}
        </option>
      </select>
    </div>

    <!-- CITY -->
    <div class="form-group">
      <label>City</label>
      <select name="cityId"
              [(ngModel)]="model.cityId"
              required>
        <option [ngValue]="null">Select City</option>
        <option *ngFor="let c of cities"
                [ngValue]="c.cityId">
          {{ c.city }}
        </option>
      </select>
    </div>

  </div>

  <div class="actions">
    <button class="primary"
            type="submit"
            [disabled]="updateForm.invalid || !isAdult(model.dateOfBirth)">
      Update
    </button>

    <button class="secondary"
            type="button"
            (click)="cancel()">
      Cancel
    </button>
  </div>

</div>
</form>

<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-box">
    <h3>Success</h3>
    <p>{{ successMessage }}</p>
    <button (click)="closeModal()">OK</button>
  </div>
</div>
