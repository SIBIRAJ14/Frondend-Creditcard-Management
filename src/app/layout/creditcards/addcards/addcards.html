<h2>Issue Credit Card</h2>
<p class="subtitle">Create a new credit card for customer</p>

<div *ngIf="errorMessage" class="error-box">
  {{ errorMessage }}
</div>

<form #form="ngForm" (ngSubmit)="save(form)" class="form-card">

  <div class="form-grid">

    <!-- CUSTOMER ID -->
    <div class="form-group">
      <label>Customer ID</label>
      <input type="number"
             name="customerId"
             [(ngModel)]="model.customerId"
             required />
    </div>

    <!-- CARD TYPE -->
    <div class="form-group">
      <label>Card Type</label>
      <select name="cardType"
              [(ngModel)]="model.cardType"
              (change)="onCardTypeChange()"
              required>
        <option value="">Select Card Type</option>
        <option value="SILVER">Silver</option>
        <option value="GOLD">Gold</option>
        <option value="PLATINUM">Platinum</option>
        <option value="DIAMOND">Diamond</option>
      </select>
    </div>

    <!-- ISSUE DATE -->
    <div class="form-group">
      <label>Issue Date</label>
      <input type="date"
             name="issueDate"
             [(ngModel)]="model.issueDate"
             required />
    </div>

    <!-- STATUS -->
    <div class="form-group">
      <label>Status</label>
      <input type="text"
             name="status"
             [(ngModel)]="model.status"
             readonly />
    </div>

    <!-- CREDIT LIMIT -->
    <div class="form-group">
      <label>Credit Limit</label>
      <input type="number"
             name="creditLimit"
             [(ngModel)]="model.creditLimit"
             readonly />
    </div>

  </div>

  <div class="actions">
    <button class="primary" type="submit">Issue Card</button>
    <button class="secondary" type="button" (click)="cancel()">Cancel</button>
  </div>

</form>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-box">
    <h3>Success</h3>
    <p>{{ successMessage }}</p>
    <button (click)="closeModal()">OK</button>
  </div>
</div>
