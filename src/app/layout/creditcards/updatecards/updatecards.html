<h2>Update Card Status</h2>
<p class="subtitle">Click the button to toggle card status</p>

<div *ngIf="errorMessage" class="error-box">
  {{ errorMessage }}
</div>

<div class="form-card" *ngIf="!loading">

  <div class="info-grid">

    <div>
      <label>Customer ID</label>
      <p>{{ card.customerId }}</p>
    </div>

    <div>
      <label>Card Type</label>
      <p>{{ card.cardType }}</p>
    </div>

    <div>
      <label>Credit Limit</label>
      <p>{{ card.creditLimit }}</p>
    </div>

    <div>
      <label>Issue Date</label>
      <p>{{ card.issueDate }}</p>
    </div>

    <div>
      <label>Current Status</label>
      <p class="status-badge"
         [ngClass]="{
           active: card.status === 'ACTIVE',
           inactive: card.status === 'INACTIVE'
         }">
        {{ card.status }}
      </p>
    </div>

  </div>

  <div class="actions">
    <button class="primary" (click)="toggleStatus()">
      Toggle Status
    </button>

    <button class="secondary" (click)="cancel()">
      Cancel
    </button>
  </div>

</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-box">
    <h3>Success</h3>
    <p>{{ successMessage }}</p>
    <button (click)="closeModal()">OK</button>
  </div>
</div>
